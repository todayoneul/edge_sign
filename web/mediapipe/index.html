<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge-Sign MediaPipe Live Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #1a73e8; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .video-container { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 8px; overflow: hidden; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .panel { display: flex; flex-direction: column; gap: 15px; }
        .card { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; }
        .card h3 { margin-top: 0; font-size: 1.1em; color: #495057; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.2em; font-weight: bold; }
        .stat-value { color: #1a73e8; }
        .stable-result { font-size: 2.5em; text-align: center; color: #28a745; margin: 20px 0; min-height: 1.2em; font-weight: 800; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; font-size: 1em; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #stopBtn { background: #dc3545; }
        #stopBtn:hover { background: #bb2d3b; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .badge.connected { background: #d4edda; color: #155724; }
        .badge.disconnected { background: #f8d7da; color: #721c24; }
    </style>
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h1>Edge-Sign Live Translator</h1>
        <p>실시간으로 웹캠을 통해 수어를 인식하고 번역합니다. 엣지 디바이스 시연을 위한 MediaPipe 모드입니다.</p>
        <div class="grid">
            <div>
                <div class="video-container">
                    <video id="input_video" autoplay playsinline></video>
                    <canvas id="output_canvas" width="640" height="480"></canvas>
                </div>
                <div class="stable-result" id="stableResult">준비 중...</div>
            </div>
            <div class="panel">
                <div class="card">
                    <h3>연결 설정</h3>
                    <input type="text" id="wsUrl" value="ws://localhost:8001/ws" placeholder="WebSocket URL">
                    <button id="startBtn">카메라 및 서버 연결 시작</button>
                    <button id="stopBtn" disabled>종료</button>
                    <div style="margin-top: 10px;">
                        상태: <span id="wsStatus" class="badge disconnected">연결 끊김</span>
                    </div>
                </div>
                <div class="card">
                    <h3>실시간 통계</h3>
                    <div class="stat">
                        <span>현재 인식 단어:</span>
                        <span id="detectedLabel" class="stat-value">-</span>
                    </div>
                    <div class="stat">
                        <span>신뢰도:</span>
                        <span id="confidenceLabel" class="stat-value">0.00</span>
                    </div>
                    <div class="stat">
                        <span>서버 FPS:</span>
                        <span id="fpsLabel" class="stat-value">0.0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
